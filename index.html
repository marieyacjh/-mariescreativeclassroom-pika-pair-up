<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pika-Pair Up - Marie's Creative Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    
    <style>
        :root {
            --poke-red: #ff0000;
            --poke-blue: #3b4cca;
            --poke-yellow: #ffde00;
            --poke-gold: #b3a125;
            --bg-light: #fffde7;
            --game-scale: 1;
        }

        body {
            font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            overflow-x: hidden;
            color: #333;
            user-select: none;
        }

        /* --- Pikachu & Pokéball Background --- */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        @keyframes drift {
            0% { transform: translate(-100px, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translate(110vw, 50vh) rotate(360deg); opacity: 0; }
        }
        .bg-obj { position: absolute; font-size: 40px; animation: drift 15s infinite linear; }

        /* --- Layout --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            transform: scale(var(--game-scale));
            transform-origin: top center;
        }
        .active { display: flex; }

        .top-hud {
            width: 95%;
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid var(--poke-blue);
            border-radius: 15px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
        }

        /* --- Typography --- */
        .pixel-title {
            font-family: 'Press Start 2P', cursive;
            color: var(--poke-blue);
            text-shadow: 4px 4px var(--poke-yellow);
            text-align: center;
        }

        /* --- Cards & Grid --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }
        .card {
            aspect-ratio: 3/4;
            background: white;
            border: 4px solid var(--poke-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: transform 0.3s;
            position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="white" stroke="black" stroke-width="2"/><path d="M5 50 a45 45 0 0 1 90 0 Z" fill="red"/><line x1="5" y1="50" x2="95" y2="50" stroke="black" stroke-width="4"/><circle cx="50" cy="50" r="12" fill="white" stroke="black" stroke-width="3"/></svg>');
            background-size: 50% 50%;
            background-repeat: no-repeat;
            background-position: center;
        }
        .card.revealed { background-image: none; border-color: var(--poke-yellow); }
        .card.matched { opacity: 0; pointer-events: none; }
        .card.frozen-card { filter: grayscale(1) blur(2px); }

        /* --- Duel Specifics --- */
        .duel-container { display: flex; width: 100%; flex: 1; gap: 10px; }
        .side { flex: 1; border: 5px solid var(--poke-gold); border-radius: 20px; padding: 15px; position: relative; background: rgba(255,255,255,0.5); }
        .side-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .lifelines { color: var(--poke-red); letter-spacing: 5px; }

        /* --- Buttons --- */
        .btn {
            background: var(--poke-yellow);
            border: 4px solid var(--poke-blue);
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 4px 4px 0 var(--poke-gold);
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; }
        
        .char-icon { width: 60px; height: 60px; cursor: pointer; border: 3px solid transparent; border-radius: 50%; }
        .char-icon.selected { border-color: var(--poke-red); background: white; }

        #timer-display { color: var(--poke-red); font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div id="home-screen" class="screen active">
        <h1 class="pixel-title" style="font-size: 3.5rem;">PIKA-PAIR UP</h1>
        <p>Marie's Creative Classroom</p>
        <div style="margin-top: 50px; display: flex; flex-direction: column; gap: 20px;">
            <button class="btn" onclick="showScreen('mode-screen')">START ADVENTURE</button>
            <button class="btn" style="background: #ff8a80;" onclick="showScreen('edit-screen')">PROF. OAK'S EDITOR</button>
            <button class="btn" style="background: #e1f5fe;" onclick="showHistory()">HALL OF FAME</button>
        </div>
    </div>

    <div id="mode-screen" class="screen">
        <h2 class="pixel-title">SELECT MODE</h2>
        <div style="display: flex; gap: 30px; margin-top: 40px;">
            <button class="btn" onclick="startPractice()">EVOLUTION ACADEMY<br>(Practice)</button>
            <button class="btn" onclick="showScreen('setup-screen')">STADIUM SHOWDOWN<br>(Duel)</button>
        </div>
        <button class="btn" style="margin-top: 40px;" onclick="showScreen('home-screen')">BACK</button>
    </div>

    <div id="setup-screen" class="screen">
        <h2 class="pixel-title">TEAM REGISTRATION</h2>
        <div style="display: flex; gap: 40px; margin-top: 20px;">
            <div class="side" style="width: 300px;">
                <h3>TEAM A</h3>
                <input type="text" id="team-a-name" value="PIKACHUS" style="width: 90%;"><br><br>
                <div id="icons-a"></div>
                <textarea id="stu-a" placeholder="Student #s (e.g. 1, 5, 9)" style="width:90%; height: 50px; margin-top: 10px;"></textarea>
            </div>
            <div class="side" style="width: 300px;">
                <h3>TEAM B</h3>
                <input type="text" id="team-b-name" value="EEVEES" style="width: 90%;"><br><br>
                <div id="icons-b"></div>
                <textarea id="stu-b" placeholder="Student #s (e.g. 2, 4, 8)" style="width:90%; height: 50px; margin-top: 10px;"></textarea>
            </div>
        </div>
        <button class="btn" style="margin-top: 30px;" onclick="startDuel()">BATTLE START!</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-hud">
            <div>
                ZOOM: <input type="range" min="0.5" max="1.2" step="0.1" value="1" oninput="adjustZoom(this.value)">
            </div>
            <div style="text-align: center;">
                TIME: <span id="timer-display" contenteditable="true" onblur="updateTimer(this.innerText)">60</span>s
            </div>
            <button class="btn" style="padding: 5px 10px;" onclick="location.reload()">QUIT</button>
        </div>

        <div id="practice-layout" style="width: 100%; display: none; flex-direction: column; align-items: center;">
            <h2 id="lab-set-title">SET 1/5</h2>
            <div id="practice-grid" class="game-grid"></div>
            <button id="next-set-btn" class="btn" style="margin-top: 20px; display: none;" onclick="nextLabSet()">NEXT SET</button>
        </div>

        <div id="duel-layout" class="duel-container" style="display: none;">
            <div class="side" id="side-a">
                <div class="side-header">
                    <span id="label-a">TEAM A</span>
                    <span class="lifelines" id="life-a">● ● ●</span>
                </div>
                <div id="duel-grid-a" class="game-grid" style="grid-template-columns: repeat(3, 1fr);"></div>
                <div style="margin-top: 10px; display: flex; justify-content: space-between;">
                    <button class="btn" style="padding: 5px;" onclick="useLifeline('a')">HELP (PokeBall)</button>
                    <span>PICKER: <b id="pick-a">?</b> <button onclick="pickStudent('a')">🎲</button></span>
                    <span>SCORE: <b id="score-a">0</b></span>
                </div>
            </div>
            <div class="side" id="side-b">
                <div class="side-header">
                    <span id="label-b">TEAM B</span>
                    <span class="lifelines" id="life-b">● ● ●</span>
                </div>
                <div id="duel-grid-b" class="game-grid" style="grid-template-columns: repeat(3, 1fr);"></div>
                <div style="margin-top: 10px; display: flex; justify-content: space-between;">
                    <button class="btn" style="padding: 5px;" onclick="useLifeline('b')">HELP (PokeBall)</button>
                    <span>PICKER: <b id="pick-b">?</b> <button onclick="pickStudent('b')">🎲</button></span>
                    <span>SCORE: <b id="score-b">0</b></span>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-screen" class="screen">
        <h2 class="pixel-title">PROF. OAK'S LAB</h2>
        <div id="editor-container" style="background: white; padding: 20px; border-radius: 15px; width: 80%; max-height: 50vh; overflow-y: auto;"></div>
        <div style="margin-top: 20px;">
            <button class="btn" onclick="addPair()">+ ADD WORD</button>
            <button class="btn" style="background: var(--poke-blue); color: white;" onclick="generateLink()">SAVE & COPY LINK</button>
            <button class="btn" onclick="showScreen('home-screen')">BACK</button>
        </div>
    </div>

    <script>
        // --- State ---
        let vocabPairs = [
            { a: "Motivate", b: "激勵 Jīlì" },
            { a: "Achieve", b: "成就 Chéngjiù" },
            { a: "Reflect", b: "反思 Fǎnsī" },
            { a: "Inspire", b: "啟發 Qǐfā" },
            { a: "Empower", b: "授權 Shòuquán" }
        ];
        let currentLevel = 1;
        let currentSet = 0;
        let timerVal = 60;
        let timerInterval;
        let scores = { a: 0, b: 0 };
        let lives = { a: 3, b: 3 };
        let teamIcons = { a: '⚡', b: '🔥' };

        // --- Init ---
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const data = urlParams.get('w');
            if(data) {
                vocabPairs = JSON.parse(LZString.decompressFromEncodedURIComponent(data));
            }
            createFloatingBg();
            renderEditor();
            setupIconPickers();
        };

        function createFloatingBg() {
            const container = document.getElementById('bg-layer');
            const objs = ['⚡', '🔴', '⭐', '☁️', '🟡'];
            for(let i=0; i<15; i++) {
                const el = document.createElement('div');
                el.className = 'bg-obj';
                el.innerText = objs[Math.floor(Math.random()*objs.length)];
                el.style.top = Math.random() * 100 + "vh";
                el.style.animationDelay = Math.random() * 10 + "s";
                container.appendChild(el);
            }
        }

        // --- Practice Logic ---
        function startPractice() {
            showScreen('game-screen');
            document.getElementById('practice-layout').style.display = 'flex';
            document.getElementById('duel-layout').style.display = 'none';
            currentSet = 0;
            loadLabSet();
            startTimer();
        }

        function loadLabSet() {
            const grid = document.getElementById('practice-grid');
            grid.innerHTML = '';
            document.getElementById('next-set-btn').style.display = 'none';
            
            // Logic: 4 pairs (8 cards). Side A up, Side B down.
            let pairs = [...vocabPairs].sort(() => 0.5 - Math.random()).slice(0, 4);
            let cards = [];
            pairs.forEach((p, i) => {
                cards.push({ txt: p.a, id: i, revealed: true });
                cards.push({ txt: p.b, id: i, revealed: false });
            });
            cards.sort(() => 0.5 - Math.random());

            cards.forEach(c => {
                const div = document.createElement('div');
                div.className = `card ${c.revealed ? 'revealed' : ''}`;
                div.innerHTML = `<span style="${c.revealed ? '' : 'display:none'}">${c.txt}</span>`;
                div.onclick = () => handleCardClick(div, c, 'practice');
                grid.appendChild(div);
            });
        }

        // --- Duel Logic ---
        function startDuel() {
            showScreen('game-screen');
            document.getElementById('practice-layout').style.display = 'none';
            document.getElementById('duel-layout').style.display = 'flex';
            document.getElementById('label-a').innerText = document.getElementById('team-a-name').value;
            document.getElementById('label-b').innerText = document.getElementById('team-b-name').value;
            currentLevel = 1;
            scores = { a:0, b:0 };
            loadDuelLevel();
            startTimer();
        }

        function loadDuelLevel() {
            const config = {
                1: { pairs: 3, cards: 6, scaffold: true, special: [] },
                2: { pairs: 3, cards: 6, scaffold: false, special: ['bomb'] },
                3: { pairs: 4, cards: 8, scaffold: false, special: ['chaos'] }
            };
            const settings = config[currentLevel];
            renderDuelBoard('a', settings);
            renderDuelBoard('b', settings);
        }

        function renderDuelBoard(side, settings) {
            const grid = document.getElementById(`duel-grid-${side}`);
            grid.innerHTML = '';
            let pairs = [...vocabPairs].sort(() => 0.5 - Math.random()).slice(0, settings.pairs);
            let cards = [];
            pairs.forEach((p, i) => {
                cards.push({ txt: p.a, id: i, revealed: settings.scaffold });
                cards.push({ txt: p.b, id: i, revealed: false });
            });
            
            settings.special.forEach(type => {
                cards.push({ txt: type === 'bomb' ? '💣' : '🌀', type: type, revealed: false });
            });

            cards.sort(() => 0.5 - Math.random());
            cards.forEach(c => {
                const div = document.createElement('div');
                div.className = `card ${c.revealed ? 'revealed' : ''}`;
                div.innerHTML = `<span style="${c.revealed ? '' : 'display:none'}">${c.txt}</span>`;
                div.onclick = () => handleCardClick(div, c, side);
                grid.appendChild(div);
            });
        }

        let choice = null;
        function handleCardClick(div, card, side) {
            if(div.classList.contains('matched') || (div.classList.contains('revealed') && side !== 'practice')) return;

            div.classList.add('revealed');
            div.querySelector('span').style.display = 'block';

            if(card.type === 'bomb') {
                div.style.background = "black";
                freezeTeam(side);
                return;
            }
            if(card.type === 'chaos') {
                swapScores();
                return;
            }

            if(!choice) {
                choice = { div, card };
            } else {
                if(choice.card.id === card.id && choice.div !== div) {
                    div.classList.add('matched');
                    choice.div.classList.add('matched');
                    if(side !== 'practice') updateScore(side, 10);
                    checkWin(side);
                } else {
                    const d1 = div;
                    const d2 = choice.div;
                    setTimeout(() => {
                        if(!card.revealed) { d1.classList.remove('revealed'); d1.querySelector('span').style.display='none'; }
                        if(!choice.card.revealed) { d2.classList.remove('revealed'); d2.querySelector('span').style.display='none'; }
                    }, 1000);
                }
                choice = null;
            }
        }

        // --- Mechanics ---
        function freezeTeam(side) {
            const grid = document.getElementById(`duel-grid-${side}`);
            grid.style.pointerEvents = 'none';
            grid.style.opacity = '0.5';
            setTimeout(() => {
                grid.style.pointerEvents = 'all';
                grid.style.opacity = '1';
                loadDuelLevel(); 
            }, 3000);
        }

        function swapScores() {
            let temp = scores.a;
            scores.a = scores.b;
            scores.b = temp;
            document.getElementById('score-a').innerText = scores.a;
            document.getElementById('score-b').innerText = scores.b;
            alert("CHAOS! SCORES SWAPPED!");
        }

        function useLifeline(side) {
            if(lives[side] <= 0) return;
            lives[side]--;
            document.getElementById(`life-${side}`).innerText = "● ".repeat(lives[side]);
            const cards = document.querySelectorAll(`#duel-grid-${side} .card`);
            cards.forEach(c => {
                c.classList.add('revealed');
                c.querySelector('span').style.display = 'block';
            });
            setTimeout(() => {
                cards.forEach(c => {
                    if(!c.classList.contains('matched')) {
                        c.classList.remove('revealed');
                        c.querySelector('span').style.display = 'none';
                    }
                });
            }, 2000);
        }

        function checkWin(side) {
            const gridId = side === 'practice' ? 'practice-grid' : `duel-grid-${side}`;
            const remaining = document.querySelectorAll(`#${gridId} .card:not(.matched):not([data-type])`).length;
            if(remaining === 0) {
                if(side === 'practice') {
                    document.getElementById('next-set-btn').style.display = 'block';
                } else {
                    alert(`${side.toUpperCase()} FINISHED!`);
                    if(currentLevel < 3) {
                        currentLevel++;
                        loadDuelLevel();
                    } else {
                        alert("TOURNAMENT COMPLETE!");
                    }
                }
            }
        }

        // --- Utilities ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerVal--;
                document.getElementById('timer-display').innerText = timerVal;
                if(timerVal <= 0) {
                    clearInterval(timerInterval);
                    alert("TIME UP!");
                }
            }, 1000);
        }

        function adjustZoom(v) { document.documentElement.style.setProperty('--game-scale', v); }

        function pickStudent(side) {
            const input = document.getElementById(`stu-${side}`).value;
            const nums = input.split(',').map(n => n.trim());
            document.getElementById(`pick-${side}`).innerText = nums[Math.floor(Math.random()*nums.length)] || "?";
        }

        function renderEditor() {
            const container = document.getElementById('editor-container');
            container.innerHTML = vocabPairs.map((p, i) => `
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" value="${p.a}" onchange="vocabPairs[${i}].a=this.value" placeholder="English">
                    <input type="text" value="${p.b}" onchange="vocabPairs[${i}].b=this.value" placeholder="Chinese + Pinyin">
                    <button onclick="vocabPairs.splice(${i},1); renderEditor()">❌</button>
                </div>
            `).join('');
        }

        function addPair() { vocabPairs.push({a:"", b:""}); renderEditor(); }

        function generateLink() {
            const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(vocabPairs));
            const url = window.location.href.split('?')[0] + "?w=" + compressed;
            navigator.clipboard.writeText(url);
            alert("URL Copied to Clipboard!");
            saveToHistory(url);
        }

        function saveToHistory(url) {
            let history = JSON.parse(localStorage.getItem('pika_history') || "[]");
            history.unshift({ url, date: new Date().toLocaleString() });
            localStorage.setItem('pika_history', JSON.stringify(history.slice(0,10)));
        }

        function showHistory() {
            const history = JSON.parse(localStorage.getItem('pika_history') || "[]");
            if(!history.length) return alert("No history yet.");
            const msg = history.map(h => h.date).join("\n");
            alert("Last 10 Games:\n" + msg);
        }

        function setupIconPickers() {
            const icons = ['⚡', '🔥', '💧', '🌿', '💤', '✨'];
            ['a', 'b'].forEach(side => {
                const div = document.getElementById(`icons-${side}`);
                icons.forEach(icon => {
                    const span = document.createElement('span');
                    span.innerText = icon;
                    span.style.fontSize = "2rem";
                    span.style.cursor = "pointer";
                    span.onclick = () => {
                        div.querySelectorAll('span').forEach(s => s.style.background = "none");
                        span.style.background = "white";
                    };
                    div.appendChild(span);
                });
            });
        }
    </script>
</body>
</html>
