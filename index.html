<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pika-Pair Up - Marie's Creative Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --poke-red: #ff0000;
            --poke-blue: #3b4cca;
            --poke-yellow: #ffde00;
            --poke-gold: #b3a125;
            --bg-light: #fffde7;
            --card-bg: #ffffff;
            --game-scale: 1;
        }

        body {
            font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            overflow-x: hidden;
            color: #333;
        }

        /* --- Animations --- */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); left: -10%; }
            50% { transform: translateY(-20px) rotate(20deg); }
            100% { transform: translateY(0px) rotate(0deg); left: 110%; }
        }

        .pikachu-bg {
            position: fixed;
            font-size: 40px;
            z-index: -1;
            opacity: 0.2;
            animation: float 15s infinite linear;
        }

        /* --- Layout --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            transform: scale(var(--game-scale));
            transform-origin: top center;
        }

        .active { display: flex; }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            color: var(--poke-blue);
            text-shadow: 3px 3px var(--poke-yellow);
            margin-bottom: 5px;
        }

        .sub-title {
            font-family: "Comic Sans MS", cursive;
            font-size: 1.2rem;
            color: #555;
            font-weight: bold;
        }

        /* --- UI Components --- */
        .btn {
            background: var(--poke-yellow);
            border: 4px solid var(--poke-blue);
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 4px 4px 0 var(--poke-gold);
            transition: all 0.1s;
        }

        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--poke-gold); }
        .btn-red { background: var(--poke-red); color: white; border-color: #800000; box-shadow: 4px 4px 0 #500000; }

        .control-panel {
            background: white;
            padding: 15px;
            border: 3px solid var(--poke-blue);
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            aspect-ratio: 3/4;
            background: white;
            border: 5px solid var(--poke-yellow);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px;
            position: relative;
            transition: transform 0.3s;
        }

        .card.matched { visibility: hidden; }
        .card.flipped { background: var(--poke-yellow); }

        .image-preview {
            width: 80%;
            height: 60%;
            object-fit: contain;
            pointer-events: none;
        }

        /* --- Duel Split --- */
        .duel-container { display: flex; width: 100vw; height: 80vh; }
        .side { flex: 1; border: 4px solid var(--poke-blue); position: relative; padding: 10px; overflow-y: auto; }
        .status-effect {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(147, 51, 234, 0.6); color: white;
            display: none; justify-content: center; align-items: center; font-size: 2rem; z-index: 10;
        }

        /* --- Editor --- */
        .pair-row { display: flex; gap: 10px; margin-bottom: 10px; background: #eee; padding: 10px; border-radius: 10px; align-items: center; }
        .drop-zone { width: 100px; height: 60px; border: 2px dashed #999; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; background: #fff; background-size: cover; background-position: center; }
        input[type="text"] { padding: 8px; border-radius: 5px; border: 1px solid #ccc; flex: 1; }

    </style>
</head>
<body>

    <div id="bg-elements"></div>

    <div id="menu-screen" class="screen active">
        <div class="title-container">
            <div class="main-title">PIKA-PAIR UP</div>
            <div class="sub-title">Marie's Creative Classroom</div>
        </div>
        <button class="btn" onclick="showScreen('mode-screen')">START ADVENTURE</button>
        <button class="btn" onclick="showScreen('edit-screen')">PROF. OAK'S LAB (EDIT)</button>
        <button class="btn" onclick="showHistory()">HALL OF FAME</button>
        <div id="load-msg" style="color:green; display:none; margin-top:20px;">LIST LOADED!</div>
    </div>

    <div id="mode-screen" class="screen">
        <div class="title-container">
            <div class="main-title" style="font-size: 1.5rem;">SELECT STAGE</div>
        </div>
        <button class="btn" onclick="initGame('practice')">PRACTICE (OAK'S LAB)</button>
        <button class="btn btn-red" onclick="initGame('duel')">STADIUM SHOWDOWN (DUEL)</button>
        <button class="btn" onclick="showScreen('menu-screen')">BACK</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="control-panel">
            <div id="picker-area">
                Trainer: <input type="text" id="stu-range" value="1-20" style="width:60px;">
                <button class="btn btn-small" style="padding:5px; font-size:0.6rem;" onclick="pickStudent()">PICK</button>
                <b id="picked-num">?</b>
            </div>
            <div>
                Zoom: <input type="range" min="0.5" max="1.5" step="0.1" value="1" oninput="adjustZoom(this.value)">
            </div>
            <div id="lives-display">❤️❤️❤️</div>
        </div>
        <div id="board" class="game-grid"></div>
        <button id="next-set-btn" class="btn" style="display:none;" onclick="loadNextSet()">NEXT SET →</button>
        <button class="btn btn-red" onclick="showScreen('menu-screen')">EXIT</button>
    </div>

    <div id="duel-screen" class="screen" style="padding:0;">
        <div class="duel-container">
            <div id="side-l" class="side">
                <div class="status-effect" id="poison-l">POISONED!</div>
                <h3 id="name-l">TEAM A</h3>
                <div id="score-l" style="font-family:'Press Start 2P';">0</div>
                <div id="board-l" class="game-grid"></div>
            </div>
            <div id="side-r" class="side">
                <div class="status-effect" id="poison-r">POISONED!</div>
                <h3 id="name-r">TEAM B</h3>
                <div id="score-r" style="font-family:'Press Start 2P';">0</div>
                <div id="board-r" class="game-grid"></div>
            </div>
        </div>
        <button class="btn btn-red" style="position:fixed; bottom:10px;" onclick="showScreen('menu-screen')">FORFEIT</button>
    </div>

    <div id="edit-screen" class="screen">
        <div class="main-title" style="font-size: 1.5rem;">EDITOR</div>
        <button class="btn" onclick="autoTranslate()">POKE-TRANSLATE (AI)</button>
        <div id="editor-list" style="width:100%; max-width:600px;"></div>
        <button class="btn" onclick="addPair()">+ ADD PAIR</button>
        <button class="btn btn-red" onclick="saveAndLink()">GENERATE GAME LINK</button>
        <div id="link-box" style="word-break:break-all; background:white; padding:10px; margin-top:10px; display:none; border: 2px solid var(--poke-blue);"></div>
        <button class="btn" onclick="showScreen('menu-screen')">BACK</button>
    </div>

    <div id="history-screen" class="screen">
        <div class="main-title" style="font-size: 1.5rem;">HALL OF FAME</div>
        <div id="history-list"></div>
        <button class="btn" onclick="showScreen('menu-screen')">BACK</button>
    </div>

    <script>
        let vocabPairs = [
            { a: "Motivate", b: "激勵 Jīlì", imgA: "", imgB: "" },
            { a: "Achieve", b: "成就 Chéngjiù", imgA: "", imgB: "" },
            { a: "Reflect", b: "反思 Fǎnsī", imgA: "", imgB: "" },
            { a: "Inspire", b: "啟發 Qǐfā", imgA: "", imgB: "" },
            { a: "Empower", b: "授權 Shòuquán", imgA: "", imgB: "" }
        ];

        let lives = 3;
        let scores = { l: 0, r: 0 };
        let flippedCards = [];
        let canFlip = true;

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('w');
            if (data) {
                try {
                    vocabPairs = JSON.parse(atob(data));
                    document.getElementById('load-msg').style.display = 'block';
                    saveToHistory(window.location.href, vocabPairs);
                } catch (e) { console.error("Load error"); }
            }
            createBGElements();
            renderEditor();
        };

        function createBGElements() {
            const container = document.getElementById('bg-elements');
            const icons = ['⚡', '🔴', '⭐', '🔥'];
            for (let i = 0; i < 6; i++) {
                let div = document.createElement('div');
                div.className = 'pikachu-bg';
                div.innerText = icons[Math.floor(Math.random() * icons.length)];
                div.style.top = Math.random() * 80 + '%';
                div.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(div);
            }
        }

        function adjustZoom(val) { document.documentElement.style.setProperty('--game-scale', val); }

        function renderEditor() {
            const container = document.getElementById('editor-list');
            container.innerHTML = '';
            vocabPairs.forEach((p, i) => {
                const row = document.createElement('div');
                row.className = 'pair-row';
                row.innerHTML = `
                    <div class="drop-zone" id="dz-a-${i}" style="background-image:url(${p.imgA})">${p.imgA ? '' : 'Img A'}</div>
                    <input type="text" value="${p.a}" onchange="updateVal(${i}, 'a', this.value)">
                    <div class="drop-zone" id="dz-b-${i}" style="background-image:url(${p.imgB})">${p.imgB ? '' : 'Img B'}</div>
                    <input type="text" value="${p.b}" onchange="updateVal(${i}, 'b', this.value)">
                `;
                container.appendChild(row);
                setupDropZone(`dz-a-${i}`, i, 'imgA');
                setupDropZone(`dz-b-${i}`, i, 'imgB');
            });
        }

        function setupDropZone(id, index, key) {
            const dz = document.getElementById(id);
            dz.ondragover = (e) => e.preventDefault();
            dz.ondrop = (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { vocabPairs[index][key] = ev.target.result; renderEditor(); };
                    reader.readAsDataURL(file);
                }
            };
        }

        function updateVal(i, key, val) { vocabPairs[i][key] = val; }
        function addPair() { vocabPairs.push({ a: "", b: "", imgA: "", imgB: "" }); renderEditor(); }

        function autoTranslate() {
            vocabPairs.forEach(p => { if (p.a && !p.b) p.b = "[Translating...]"; });
            renderEditor();
            alert("Poke-Translate: Internal dictionary triggered.");
        }

        function saveAndLink() {
            const encoded = btoa(JSON.stringify(vocabPairs));
            const url = window.location.href.split('?')[0] + "?w=" + encoded;
            const lb = document.getElementById('link-box');
            lb.innerText = url;
            lb.style.display = 'block';
            navigator.clipboard.writeText(url);
            alert("Link Copied!");
        }

        function initGame(mode) {
            if (mode === 'practice') {
                showScreen('game-screen');
                startSet(0, 'board');
            } else {
                showScreen('duel-screen');
                startSet(0, 'board-l', 'l');
                startSet(0, 'board-r', 'r');
            }
        }

        function startSet(index, containerId, side = null) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            let deck = [];
            vocabPairs.forEach((p, i) => {
                deck.push({ text: p.a, img: p.imgA, match: i });
                deck.push({ text: p.b, img: p.imgB, match: i });
            });
            deck.sort(() => Math.random() - 0.5);
            deck.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.match = item.match;
                card.dataset.side = side;
                card.onclick = () => handleFlip(card);
                card.innerHTML = item.img ? `<img src="${item.img}" class="image-preview">` : item.text;
                container.appendChild(card);
            });
        }

        function handleFlip(card) {
            if (!canFlip || card.classList.contains('matched') || card.classList.contains('flipped')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            if (flippedCards.length === 2) {
                canFlip = false;
                setTimeout(checkMatch, 800);
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            const side = c1.dataset.side;
            if (c1.dataset.match === c2.dataset.match) {
                c1.classList.add('matched'); c2.classList.add('matched');
                if (side) { scores[side] += 10; document.getElementById(`score-${side}`).innerText = scores[side]; }
            } else {
                c1.classList.remove('flipped'); c2.classList.remove('flipped');
                if (!side) { lives--; updateLives(); }
            }
            flippedCards = []; canFlip = true;
            if (document.querySelectorAll('.card:not(.matched)').length === 0) document.getElementById('next-set-btn').style.display = 'block';
        }

        function updateLives() {
            document.getElementById('lives-display').innerText = "❤️".repeat(Math.max(0, lives));
            if (lives <= 0) { alert("Game Over!"); showScreen('menu-screen'); }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function pickStudent() {
            const range = document.getElementById('stu-range').value;
            const picked = Math.floor(Math.random() * 20) + 1; // Simplified for demo
            document.getElementById('picked-num').innerText = picked;
        }

        function saveToHistory(url, list) {
            let history = JSON.parse(localStorage.getItem('pika_history') || "[]");
            history.unshift({ url, date: new Date().toLocaleDateString(), preview: list[0].a });
            localStorage.setItem('pika_history', JSON.stringify(history.slice(0, 10)));
        }

        function showHistory() {
            const list = JSON.parse(localStorage.getItem('pika_history') || "[]");
            const container = document.getElementById('history-list');
            container.innerHTML = list.map(i => `<div class='btn' onclick='window.location.href="${i.url}"'>${i.date}: ${i.preview}</div>`).join('');
            showScreen('history-screen');
        }
    </script>
</body>
</html>
